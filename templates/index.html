<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prediksi UMKM - Kabupaten Bandung</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --glass: rgba(255, 255, 255, 0.8);
            --text-dark: #1e293b;
            --text-light: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .badge {
            background: #e0e7ff;
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin: 25px 0;
            position: relative;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
        }

        .result-card {
            margin-top: 30px;
            padding: 20px;
            background: white;
            border-radius: 16px;
            border: 1px dashed #cbd5e1;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-light);
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .footer b { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🤖 AI Prediksi UMKM</h1>
        <span class="badge">Kab. Bandung • Machine Learning</span>
    </div>

    <form action="/predict" method="POST">
        <div class="input-group">
            <input type="number" name="tahun" placeholder="Masukkan Tahun (contoh: 2026)" required>
        </div>
        <button type="submit">Prediksi Sekarang</button>
    </form>

    {% if prediction_text %}
    <div class="result-card">
        <div class="result-label">Prediksi Jumlah UMKM:</div>
        <div class="result-value">{{ prediction_text }}</div>
    </div>
    {% endif %}

    <div class="footer">
        Powered by <b>Linear Regression</b> & <b>Flask</b>
    </div>
</div>

</body>
</html>
