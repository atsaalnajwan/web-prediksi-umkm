<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Prediksi UMKM</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            color: white;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);

            animation: fadeIn 0.8s ease;
        }

        h1 {
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            width: 80%;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .hasil {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card">
    <h1>📊 Prediksi UMKM</h1>

    <form method="POST">
        <input type="number" name="tahun" placeholder="Masukkan tahun" required>
        <br>
        <button type="submit">Prediksi</button>
    </form>

    {% if hasil is not none %}
        <div class="hasil">
            Hasil Prediksi: {{ hasil }}
        </div>
    {% endif %}
</div>

</body>
</html>
